<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<link rel="manifest" href="booking-manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="booking-icon.png">

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0c0a;--surface:#1a1814;--surface2:#242018;--surface3:#2e2a22;
  --gold:#c9a96e;--gold2:#e8c98a;--text:#f0ece4;--text2:#a89880;--text3:#6b5f4e;
  --green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--border:rgba(201,168,76,0.15);
  --rsm:10px;--rmd:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;text-align:center;position:relative;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);letter-spacing:1px;}
.logo small{display:block;font-family:'Jost',sans-serif;font-size:13px;color:var(--text3);letter-spacing:2px;font-weight:400;margin-top:3px;}
.container{max-width:480px;margin:0 auto;padding:16px 16px 40px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rmd);padding:18px;margin-bottom:14px;}
.section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;font-weight:700;}

/* Client dashboard card */
.client-dash{display:flex;gap:14px;align-items:center;}
.client-avatar{width:50px;height:50px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--bg);flex-shrink:0;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:16px;font-weight:700;color:var(--gold2);}
.client-plan{font-size:12px;color:var(--text2);margin-top:2px;}
.client-sessions{display:flex;gap:12px;margin-top:8px;font-size:11px;}
.sess-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;flex:1;}
.sess-num{font-size:16px;font-weight:700;color:var(--gold);}
.sess-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.qr-mini{width:50px;height:50px;border-radius:8px;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#1a1a2e;}
.qr-mini .qr-glyph{font-size:20px;line-height:1;}
.qr-mini .qr-label{font-size:8px;font-weight:800;letter-spacing:1px;margin-top:1px;}
.qr-box{background:white;border-radius:12px;padding:14px;display:inline-flex;margin:6px auto 4px;}

/* Date selector */
.date-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.date-row::-webkit-scrollbar{display:none;}
.date-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;text-align:center;cursor:pointer;min-width:52px;transition:all 0.2s;}
.date-btn.selected{background:rgba(201,168,76,0.15);border-color:var(--gold);}
.date-btn .day{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.date-btn .num{font-size:18px;font-weight:700;color:var(--text);line-height:1.2;}
.date-btn .mon{font-size:9px;color:var(--text2);}
.date-btn.selected .num{color:var(--gold);}
.date-btn.today .num{color:var(--gold2);}

/* Slot grid */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.slot-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.15s;}
.slot-btn:active{transform:scale(0.97);}
.slot-btn.full{opacity:0.3;cursor:not-allowed;}
.slot-btn .slot-time{font-size:14px;font-weight:700;}
.slot-btn .slot-avail{font-size:10px;color:var(--green);margin-top:2px;}
.slot-btn.full .slot-avail{color:var(--red);}
.slot-period{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px;font-weight:600;}

/* Confirm popup */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.popup-overlay.open{display:flex;}
.popup{background:var(--surface);border:1px solid var(--gold);border-radius:20px;padding:24px 20px;width:90%;max-width:380px;text-align:center;}
.popup h3{color:var(--gold);font-size:16px;margin-bottom:14px;}
.popup .detail{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);}
.popup .detail:last-of-type{border:none;}
.popup .dlbl{color:var(--text3);}
.popup .dval{color:var(--text);font-weight:600;}

/* Auth screen */
.auth-card{text-align:center;padding:40px 20px;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;background:white;color:#333;border:none;border-radius:var(--rsm);font-family:'Jost',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:16px;}
.google-btn img{width:20px;height:20px;}

.btn-book{width:100%;padding:14px;background:var(--gold);color:var(--bg);border:none;border-radius:30px;font-family:'Jost',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;letter-spacing:0.5px;}
.btn-book:disabled{opacity:0.4;cursor:not-allowed;}
.btn-outline{width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:30px;color:var(--text2);font-family:'Jost',sans-serif;font-size:13px;cursor:pointer;margin-top:8px;}
.btn-sm{padding:10px 16px;font-size:13px;border-radius:20px;border:none;font-family:'Jost',sans-serif;font-weight:600;cursor:pointer;}

.note{text-align:center;font-size:11px;color:var(--text3);margin-top:12px;line-height:1.5;}
.loading{text-align:center;padding:60px 20px;color:var(--text3);}
.spinner{display:inline-block;animation:spin 1s linear infinite;font-size:24px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Success */
.success{text-align:center;padding:30px 0;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin-bottom:8px;}
.success-sub{color:var(--text2);font-size:14px;margin-bottom:20px;}

/* Logout */
.logout-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:10px;color:var(--text3);font-family:'Jost',sans-serif;cursor:pointer;}

/* Live indicator */
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Pilates D'Luxe<small>Book a Session · v34</small></div>
</div>

<div class="container">
  <div id="main-content">
    <div class="loading"><span class="spinner">⟳</span><br/><br/>Connecting...</div>
  </div>
</div>

<!-- Booking confirmation popup -->
<div class="popup-overlay" id="confirm-popup">
  <div class="popup">
    <h3>✅ Confirm Booking</h3>
    <div id="popup-details"></div>
    <button class="btn-book" id="popup-confirm-btn" onclick="confirmBooking()">Book Now</button>
    <button class="btn-outline" onclick="closePopup()">Cancel</button>
  </div>
</div>

<script>
const _cfg={apiKey:"AIzaSyDq5AjTUCxZ85CBffYFh_MmKhibN7Pjnl8",authDomain:"ss-indent-pro-3b7ea.firebaseapp.com",projectId:"ss-indent-pro-3b7ea",storageBucket:"ss-indent-pro-3b7ea.firebasestorage.app",messagingSenderId:"221934576188",appId:"1:221934576188:web:9c6ae243ea05b701bc5939"};
if(!firebase.apps.length)firebase.initializeApp(_cfg);
const db=firebase.firestore();
const COL='pilates';

const SLOTS=['7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM'];
const MACHINES=5;
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let _clients=[], _bookings={}, _mems={}, _closedDays={};
let _selDate='', _client=null, _googleUser=null;
async function pdlHashPin(cid,pin){
  try{
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('pdlbook|'+cid+'|'+pin));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){return 'plain:'+pin;}
}
let _unsubBookings=null; /* onSnapshot unsubscribe */

/* ===== HELPERS ===== */
function td(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmt(d){if(!d)return '';const[y,m,dd]=d.split('-');const dt=new Date(+y,+m-1,+dd);return dt.getDate()+' '+MONTHS[dt.getMonth()]+' '+y;}
function fmtDay(d){if(!d)return '';const[y,m,dd]=d.split('-');const dt=new Date(+y,+m-1,+dd);return DAYS[dt.getDay()]+', '+dt.getDate()+' '+MONTHS[dt.getMonth()];}

function getNext7Days(){
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    days.push({key:`${y}-${m}-${dd}`,day:DAYS[d.getDay()],num:d.getDate(),mon:MONTHS[d.getMonth()],isToday:i===0});
  }
  return days;
}

function getSlotAvail(date,slot){
  const bks=(_bookings[date]&&_bookings[date][slot])||[];
  return MACHINES-bks.length;
}

/* Mirror of the studio app's _sessUsedInPlan fix: only count attendance
   that falls WITHIN the current membership's period (startDate..endDate).
   Without this, a renewed client's old-plan attendance kept counting
   against the fresh plan — and once it reached the plan total, the
   booking page wrongly BLOCKED her ("No sessions remaining") despite a
   brand-new, fully-paid plan. Legacy guard: no startDate → count all. */
function getSessionsUsed(cid,mem){
  const s=mem&&mem.startDate?mem.startDate:null;
  const e=mem&&mem.endDate?mem.endDate:null;
  let used=0;
  Object.entries(_bookings).forEach(([dt,day])=>{
    if(s&&dt<s)return;
    if(e&&dt>e)return;
    Object.values(day||{}).forEach(arr=>{
      (arr||[]).forEach(b=>{if(b.cid===cid&&b.attended)used++;});
    });
  });
  return used;
}

/* ===== AUTH FLOW ===== */
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    _googleUser=user;
    loadDataAndVerify();
  }else{
    showSignIn();
  }
});

function showSignIn(){
  document.getElementById('main-content').innerHTML=`
    <div class="auth-card">
      <div style="font-size:48px;margin-bottom:16px;">🧘‍♀️</div>
      <h2 style="font-family:'Playfair Display',serif;color:var(--gold);margin-bottom:8px;">Welcome</h2>
      <p style="color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.6;">Sign in with your registered Google account to book a session.</p>
      <button class="google-btn" onclick="signInGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>
        Continue with Google
      </button>
      <p class="note">Your Google email must match the email registered at the studio.</p>
    </div>`;
}

async function signInGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  /* Without this, Google silently reuses whichever account is already
     cached in the browser and never shows the account picker — so
     switching accounts (or fixing a wrong email) looked impossible. */
  provider.setCustomParameters({prompt:'select_account'});
  /* Safari (especially in standalone/installed-app mode) is well known
     to handle POPUP-based OAuth unreliably — the popup can fail to close
     properly, leaving a blank orphaned window behind, or the sign-in can
     simply hang. Redirect-based sign-in avoids the popup entirely and is
     the officially recommended approach for Safari. Other browsers keep
     the smoother in-place popup flow. */
  const isSafari=/^((?!chrome|android|crios|fxios).)*safari/i.test(navigator.userAgent);
  if(isSafari){
    try{await firebase.auth().signInWithRedirect(provider);}
    catch(e){showAlert('Sign in failed. Please try again.','😕');}
    return; /* page will navigate away and back; onAuthStateChanged picks up the result */
  }
  try{
    const result=await firebase.auth().signInWithPopup(provider);
    _googleUser=result.user;
    loadDataAndVerify();
  }catch(e){
    showAlert('Sign in failed. Please try again.','😕');
  }
}

/* ===== LOAD DATA + VERIFY MEMBER ===== */
async function loadDataAndVerify(){
  document.getElementById('main-content').innerHTML='<div class="loading"><span class="spinner">⟳</span><br/><br/>Loading your profile...</div>';
  try{
    const opts={source:'server'}; /* always fetch fresh from server */
    const [cSnap, bSnap, mSnap, cdSnap]=await Promise.all([
      db.collection(COL).doc('pp_clients').get(opts),
      db.collection(COL).doc('pp_bookings').get(opts),
      db.collection(COL).doc('pp_memberships').get(opts),
      db.collection(COL).doc('pp_closed_days').get(opts)
    ]);
    _clients=cSnap.exists?JSON.parse(cSnap.data().value):[];
    _bookings=bSnap.exists?JSON.parse(bSnap.data().value):{};
    _mems=mSnap.exists?JSON.parse(mSnap.data().value):{};
    _closedDays=cdSnap.exists?JSON.parse(cdSnap.data().value):{};
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="loading">⚠️ Could not load data. Please refresh.</div>';
    return;
  }

  /* Verify this Google email is a registered client */
  const email=_googleUser.email.toLowerCase();
  _client=_clients.find(c=>!c.archived&&c.email&&c.email.toLowerCase()===email);
  if(!_client){
    document.getElementById('main-content').innerHTML=`
      <div class="auth-card">
        <div style="font-size:48px;margin-bottom:12px;">😕</div>
        <h3 style="color:var(--red);margin-bottom:8px;">Not Registered</h3>
        <p style="color:var(--text2);font-size:13px;line-height:1.6;">
          <b style="color:var(--text);">${_googleUser.email}</b><br/>is not registered at Pilates D'Luxe.<br/><br/>
          Please contact the studio to register your email.
        </p>
        <button class="btn-outline" style="margin-top:20px;" onclick="firebase.auth().signOut();_googleUser=null;">← Sign in with a different account</button>
      </div>`;
    return;
  }

  /* PIN-based booking protection: require a client-created PIN before
     showing the dashboard, so a child using a parent's phone can't book
     or cancel by accident. Studio can reset it (clears bookingPinH) if
     the client forgets — that just brings them back here once. */
  if(!_client.bookingPinH){
    renderPinSetup();
    return;
  }

  /* Start real-time listener for bookings */
  startBookingSync();
  /* Render the booking dashboard */
  _selDate=td();
  renderDashboard();
}
function renderPinSetup(){
  document.getElementById('main-content').innerHTML=`
    <div class="auth-card">
      <div style="font-size:40px;margin-bottom:10px;">🔒</div>
      <h3 style="margin-bottom:8px;">Create Your Booking PIN</h3>
      <p style="color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:16px;">
        This protects your bookings from accidental taps — for example if a child uses this phone.
        You'll enter it whenever you book or cancel a class. The studio can reset it if you ever forget.
      </p>
      <input id="pin-new" type="password" inputmode="numeric" maxlength="6" placeholder="Choose PIN (4-6 digits)" style="width:100%;text-align:center;font-size:20px;letter-spacing:8px;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);margin-bottom:10px;box-sizing:border-box;"/>
      <input id="pin-confirm" type="password" inputmode="numeric" maxlength="6" placeholder="Confirm PIN" style="width:100%;text-align:center;font-size:20px;letter-spacing:8px;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);margin-bottom:14px;box-sizing:border-box;"/>
      <div id="pin-setup-err" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px;"></div>
      <button class="btn-book" style="margin:0;" onclick="saveNewPin()">Save PIN &amp; Continue</button>
    </div>`;
}
async function saveNewPin(){
  const p1=document.getElementById('pin-new').value.trim();
  const p2=document.getElementById('pin-confirm').value.trim();
  const err=document.getElementById('pin-setup-err');
  if(!/^\d{4,6}$/.test(p1)){err.textContent='PIN must be 4-6 digits';return;}
  if(p1!==p2){err.textContent='PINs do not match';return;}
  err.textContent='Saving...';
  try{
    const h=await pdlHashPin(_client.id,p1);
    const cSnap=await db.collection(COL).doc('pp_clients').get();
    const freshClients=cSnap.exists?JSON.parse(cSnap.data().value):[];
    const idx=freshClients.findIndex(c=>c.id===_client.id);
    if(idx>-1)freshClients[idx].bookingPinH=h;
    await db.collection(COL).doc('pp_clients').set({value:JSON.stringify(freshClients),updated:Date.now()});
    _clients=freshClients;
    _client=freshClients.find(c=>c.id===_client.id);
    startBookingSync();
    _selDate=td();
    renderDashboard();
    showToast('✓ PIN saved');
  }catch(e){err.textContent='Could not save PIN — please try again.';}
}
let _pinVerifyCallback=null;
function askPin(title,callback){
  document.getElementById('pin-verify-title').textContent=title;
  document.getElementById('pin-verify-input').value='';
  document.getElementById('pin-verify-err').textContent='';
  _pinVerifyCallback=callback;
  document.getElementById('pin-verify-popup').classList.add('open');_pushModalHistory();
  setTimeout(()=>{const el=document.getElementById('pin-verify-input');if(el)el.focus();},150);
}
async function _pinVerifySubmit(){
  const pin=document.getElementById('pin-verify-input').value.trim();
  const err=document.getElementById('pin-verify-err');
  if(!pin){err.textContent='Enter your PIN';return;}
  const h=await pdlHashPin(_client.id,pin);
  if(h===_client.bookingPinH){
    document.getElementById('pin-verify-popup').classList.remove('open');
    const cb=_pinVerifyCallback;_pinVerifyCallback=null;
    if(cb)cb();
  }else{
    err.textContent='Wrong PIN — try again';
  }
}

/* ===== REAL-TIME SYNC ===== */
/* Restart the live listener whenever the app comes back to the foreground
   — covers "closed completely and reopened" and general mobile/Safari
   backgrounding, where a listener can silently die while hidden. */
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&_client)startBookingSync();
});
function startBookingSync(){
  if(_unsubBookings)_unsubBookings(); /* clear old listener */
  _unsubBookings=db.collection(COL).doc('pp_bookings').onSnapshot(snap=>{
    if(snap.exists){
      _bookings=JSON.parse(snap.data().value);
      /* THE FIX: this used to only call renderSlots(), which refreshes
         the slot grid (so a freed/taken slot updates immediately) but
         never touches the separate "My Bookings" card — that section
         only ever caught up when the whole dashboard re-rendered for
         some other reason. Booking/cancelling was always instant under
         the hood; only this one card's redraw was being skipped. */
      if(_client&&document.getElementById('main-content')){
        renderDashboard();
      }
    }
  },err=>{
    /* Previously this just logged a warning and left the listener dead
       for the rest of the session — matching "can't reload data, then no
       sync ever again until a full restart." Now it retries on its own
       after a short pause instead of staying silently broken. */
    console.warn('Booking sync error:',err);
    setTimeout(()=>{if(_client)startBookingSync();},3000);
  });
}

/* ===== MY QR CODE =====
   Payload format 'PDL:'+id MUST match _memberQRPayload() in the studio
   app (index.html) — that's what the admin's check-in scanner reads. */
function openMyQR(){
  const c=_client;
  if(!c)return;
  const t=document.getElementById('qr-box-target');
  t.innerHTML='';
  try{
    new QRCode(t,{text:'PDL:'+c.id,width:180,height:180,colorDark:'#1a1a2e',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){t.innerHTML='<div style="color:#a50e0e;font-size:12px;padding:20px;">QR unavailable — please tell the front desk.</div>';}
  document.getElementById('qr-name-lbl').textContent=(c.fname||'')+' '+(c.lname||'');
  document.getElementById('qr-popup').classList.add('open');_pushModalHistory();
}

/* ===== MAIN DASHBOARD ===== */
function renderDashboard(){
  const c=_client;
  const mem=_mems[c.id];
  const plan=mem?mem.plan:'none';
  const sessTotal=plan==='trial'?1:(plan==='unlimited'?'∞':(mem?(mem.sessions||mem.sessionsTotal||0)+(mem.bonus||0):0));
  const sessUsed=getSessionsUsed(c.id,mem);
  const sessLeft=plan==='unlimited'?'∞':(typeof sessTotal==='number'?Math.max(0,sessTotal-sessUsed):0);
  const planName=plan==='trial'?'Trial Session':plan==='unlimited'?'Unlimited':(mem?mem.plan:'No Plan');
  const endDate=mem&&mem.endDate?fmt(mem.endDate):'—';
  const initial=(c.fname||'?')[0].toUpperCase();

  document.getElementById('main-content').innerHTML=`
    <!-- Client Dashboard -->
    <div class="card" style="padding:14px 16px;">
      <div class="client-dash">
        <div class="client-avatar">${initial}</div>
        <div class="client-info">
          <div class="client-name">${c.fname} ${c.lname||''}</div>
          <div class="client-plan">📋 ${planName} • Expires: ${endDate}</div>
        </div>
        <div class="qr-mini" onclick="openMyQR()" title="Show my QR code"><span class="qr-glyph">▦</span><span class="qr-label">QR</span></div>
        <button class="logout-btn" onclick="firebase.auth().signOut();_googleUser=null;_client=null;" style="position:static;transform:none;">Sign Out</button>
      </div>
      <div class="client-sessions">
        <div class="sess-item"><div class="sess-num">${sessTotal}</div><div class="sess-lbl">Total</div></div>
        <div class="sess-item"><div class="sess-num" style="color:var(--green);">${sessUsed}</div><div class="sess-lbl">Attended</div></div>
        <div class="sess-item"><div class="sess-num" style="color:${sessLeft===0?'var(--red)':'var(--gold)'};">${sessLeft}</div><div class="sess-lbl">Remaining</div></div>
      </div>
    </div>

    <!-- My Upcoming Bookings (collapsible) -->
    ${(()=>{
      const upcoming=getMyUpcomingBookings();
      if(!upcoming.length)return '';
      return '<div class="card" style="padding:12px 16px;"><div class="section-title" style="cursor:pointer;display:flex;justify-content:space-between;" onclick="const b=document.getElementById(\'my-bk-list\');b.style.display=b.style.display===\'none\'?\'\':\'none\';this.querySelector(\'span\').textContent=b.style.display===\'none\'?\'▶\':\'▼\';">📌 My Bookings ('+upcoming.length+')<span style="font-size:10px;">▼</span></div>'+
        '<div id="my-bk-list">'+upcoming.map(u=>{
          const isPast=u.date<td()||(u.date===td()&&isSlotPast(u.slot));
          return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;"><span>'+fmtDay(u.date)+' • <b>'+u.slot+'</b></span><span style="font-size:11px;color:'+(isPast?'var(--green)':'var(--gold)')+';">'+(isPast?'✓ Done':'Upcoming')+'</span></div>';
        }).join('')+'</div></div>';
    })()}

    <!-- Date Picker -->
    <div class="card" style="padding:14px 16px;">
      <div class="section-title"><span class="live-dot"></span> Live Schedule</div>
      <div class="date-row" id="date-row">${renderDates()}</div>
    </div>

    <!-- Slots -->
    <div id="slots-area">${renderSlotsHTML()}</div>

    <p class="note">Tap any available slot to book instantly. <br/>Schedule updates live — no refresh needed.</p>
  `;
}

function renderDates(){
  const days=getNext7Days();
  if(_closedDays[_selDate]){
    const fo=days.find(d=>!_closedDays[d.key]);
    if(fo)_selDate=fo.key;
  }
  return days.map(d=>{
    const isClosed=!!_closedDays[d.key];
    return `<div class="date-btn${d.key===_selDate?' selected':''}${d.isToday?' today':''}" onclick="${isClosed?'':'selectDate(\''+d.key+'\')'}" style="${isClosed?'opacity:0.3;cursor:not-allowed;':''}">
      <div class="day">${d.isToday?'Today':d.day}</div>
      <div class="num">${d.num}</div>
      <div class="mon">${isClosed?'🚫':d.mon}</div>
    </div>`;
  }).join('');
}

function selectDate(d){
  if(_closedDays[d])return;
  _selDate=d;
  document.getElementById('date-row').innerHTML=renderDates();
  renderSlots();
}

function renderSlots(){
  document.getElementById('slots-area').innerHTML=renderSlotsHTML();
}

function renderSlotsHTML(){
  if(_closedDays[_selDate]){
    return `<div class="card" style="text-align:center;padding:24px;">
      <div style="font-size:32px;margin-bottom:8px;">🚫</div>
      <div style="font-size:14px;font-weight:700;color:var(--red);">Studio Closed</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;">${_closedDays[_selDate].reason||'Closed'}</div>
    </div>`;
  }
  const morning=SLOTS.slice(0,5).map(s=>slotBtn(s)).join('');
  const evening=SLOTS.slice(5).map(s=>slotBtn(s)).join('');
  return `<div class="card" style="padding:14px 16px;">
    <div class="slot-period">☀️ Morning</div>
    <div class="slot-grid">${morning}</div>
    <div class="slot-period">🌙 Evening</div>
    <div class="slot-grid">${evening}</div>
  </div>`;
}

function slotBtn(slot){
  const avail=getSlotAvail(_selDate,slot);
  const full=avail<=0;
  const myBooking=(_bookings[_selDate]&&_bookings[_selDate][slot]||[]).some(b=>b.cid===_client.id);
  /* Check if already booked ANY slot today */
  const bookedToday=Object.values(_bookings[_selDate]||{}).some(arr=>(arr||[]).some(b=>b.cid===_client.id));
  /* Block past time slots for today */
  const isPast=_selDate===td()&&isSlotPast(slot);

  if(myBooking){
    return `<div class="slot-btn" style="background:rgba(46,204,113,0.1);border-color:var(--green);">
      <div class="slot-time">${slot}</div>
      <div class="slot-avail" style="color:var(--green);">✓ Booked</div>
      <button onclick="event.stopPropagation();cancelBooking('${slot}')" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:12px;padding:3px 10px;font-size:10px;margin-top:4px;cursor:pointer;font-family:'Jost',sans-serif;">Cancel</button>
    </div>`;
  }
  if(isPast){
    return `<div class="slot-btn" style="opacity:0.25;cursor:not-allowed;">
      <div class="slot-time">${slot}</div>
      <div class="slot-avail" style="color:var(--text3);">Past</div>
    </div>`;
  }
  const blocked=full||(bookedToday&&!myBooking);
  const reason=full?'Full':bookedToday?'1 booking/day':'';
  return `<div class="slot-btn${blocked?' full':''}" onclick="${blocked?'':'openPopup(\''+slot+'\')'}">
    <div class="slot-time">${slot}</div>
    <div class="slot-avail">${blocked?reason:avail+' spot'+(avail>1?'s':'')+' left'}</div>
  </div>`;
}

function isSlotPast(slot){
  const now=new Date();
  const[time,ampm]=slot.split(' ');
  let[h,m]=time.split(':').map(Number);
  if(ampm==='PM'&&h!==12)h+=12;
  if(ampm==='AM'&&h===12)h=0;
  return now.getHours()>h||(now.getHours()===h&&now.getMinutes()>=(m||0));
}

/* ===== BOOKING POPUP ===== */
function openPopup(slot){
  const mem=_mems[_client.id];
  /* Check sessions */
  if(mem&&mem.plan!=='unlimited'){
    const used=getSessionsUsed(_client.id,mem);
    const total=mem.plan==='trial'?1:((mem.sessions||mem.sessionsTotal||0)+(mem.bonus||0));
    if(used>=total){
      showAlert('No sessions remaining. Please renew your membership.','⚠️');return;
    }
  }
  if(!mem){showAlert('No active membership found. Please contact the studio.','⚠️');return;}

  document.getElementById('popup-details').innerHTML=`
    <div class="detail"><span class="dlbl">Name</span><span class="dval">${_client.fname} ${_client.lname||''}</span></div>
    <div class="detail"><span class="dlbl">Date</span><span class="dval">${fmtDay(_selDate)}</span></div>
    <div class="detail"><span class="dlbl">Time</span><span class="dval">${slot}</span></div>
    <div class="detail"><span class="dlbl">Plan</span><span class="dval">${mem.plan==='unlimited'?'Unlimited':mem.plan}</span></div>
  `;
  document.getElementById('popup-confirm-btn').disabled=false;
  document.getElementById('popup-confirm-btn').textContent='Book Now ✓';
  document.getElementById('popup-confirm-btn').setAttribute('data-slot',slot);
  document.getElementById('confirm-popup').classList.add('open');_pushModalHistory();
}

function closePopup(){
  document.getElementById('confirm-popup').classList.remove('open');
}

async function confirmBooking(){
  const slot=document.getElementById('popup-confirm-btn').getAttribute('data-slot');
  closePopup();
  askPin('Enter PIN to Confirm Booking',()=>_doConfirmBooking(slot));
}
async function _doConfirmBooking(slot){
  try{
    /* Re-fetch latest to avoid conflicts */
    const bSnap=await db.collection(COL).doc('pp_bookings').get();
    const freshBk=bSnap.exists?JSON.parse(bSnap.data().value):{};
    if(!freshBk[_selDate])freshBk[_selDate]={};
    if(!freshBk[_selDate][slot])freshBk[_selDate][slot]=[];
    if(freshBk[_selDate][slot].length>=MACHINES){
      showAlert('This slot just filled up! Please choose another.','😅');
      renderSlots();return;
    }
    if(freshBk[_selDate][slot].some(b=>b.cid===_client.id)){
      showAlert('You are already booked for this slot!','📌');return;
    }
    /* Add booking */
    freshBk[_selDate][slot].push({cid:_client.id,notes:'Online booking',attended:false,bookedAt:new Date().toISOString()});
    await db.collection(COL).doc('pp_bookings').set({value:JSON.stringify(freshBk),updated:Date.now()});
    _bookings=freshBk;
    renderDashboard(); /* refresh entire view including My Bookings */
    showToast('🎉 Booked! '+fmtDay(_selDate)+' at '+slot);
  }catch(e){
    showAlert('Booking failed. Please try again.','😕');
  }
}

async function cancelBooking(slot){
  showConfirmDialog('Cancel your '+slot+' booking on '+fmtDay(_selDate)+'?',()=>{
    askPin('Enter PIN to Cancel Booking',()=>_doCancelBooking(slot));
  });
}
async function _doCancelBooking(slot){
  try{
    const bSnap=await db.collection(COL).doc('pp_bookings').get();
    const freshBk=bSnap.exists?JSON.parse(bSnap.data().value):{};
    if(freshBk[_selDate]&&freshBk[_selDate][slot]){
      freshBk[_selDate][slot]=freshBk[_selDate][slot].filter(b=>b.cid!==_client.id);
      if(freshBk[_selDate][slot].length===0)delete freshBk[_selDate][slot];
      if(Object.keys(freshBk[_selDate]).length===0)delete freshBk[_selDate];
    }
    await db.collection(COL).doc('pp_bookings').set({value:JSON.stringify(freshBk),updated:Date.now()});
    _bookings=freshBk;
    renderDashboard(); /* refresh entire view including My Bookings */
    showToast('Booking cancelled');
  }catch(e){showAlert('Could not cancel. Please try again.','😕');}
}

function getMyUpcomingBookings(){
  const today=td();const results=[];
  Object.entries(_bookings).forEach(([date,slots])=>{
    if(date<today)return;
    Object.entries(slots||{}).forEach(([slot,arr])=>{
      (arr||[]).forEach(b=>{
        if(b.cid===_client.id)results.push({date,slot});
      });
    });
  });
  results.sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot));
  return results;
}

function showToast(msg){
  let t=document.getElementById('bk-toast');
  if(!t){t=document.createElement('div');t.id='bk-toast';t.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);padding:12px 24px;border-radius:30px;font-size:14px;font-weight:700;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:90%;text-align:center;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>{t.style.opacity='0';},3000);
}
function showAlert(msg,icon){
  const ov=document.getElementById('alert-popup');
  document.getElementById('alert-icon').textContent=icon||'ℹ️';
  document.getElementById('alert-msg').textContent=msg;
  ov.classList.add('open');
  _pushModalHistory();
}
function showConfirmDialog(msg,onYes){
  const ov=document.getElementById('confirm-dialog');
  document.getElementById('cd-msg').textContent=msg;
  document.getElementById('cd-yes').onclick=()=>{ov.classList.remove('open');onYes();};
  ov.classList.add('open');
  _pushModalHistory();
}

/* ===== TO-AND-FRO NAVIGATION (pending note #16) =====
   One step at a time: the phone's Back button / swipe-back gesture closes
   whichever popup is currently open, instead of leaving the booking page
   entirely. Each popup open() adds one history entry; Back consumes it
   and closes that one popup — press Back again to close the next one, and
   so on, same as normal app behaviour. */
function _pushModalHistory(){
  history.pushState({pdlModal:true},'');
}
window.addEventListener('popstate',()=>{
  const openPopups=document.querySelectorAll('.popup-overlay.open');
  if(openPopups.length){
    openPopups[openPopups.length-1].classList.remove('open');
  }
});
</script>

<!-- My QR popup -->
<div class="popup-overlay" id="qr-popup">
  <div class="popup" style="padding:26px 22px;">
    <h3 style="margin-bottom:10px;">Your Check-in QR</h3>
    <div style="font-size:12px;color:var(--text2);margin-bottom:14px;">Show this at the studio to check in</div>
    <div class="qr-box" id="qr-box-target"></div>
    <div style="font-size:11px;color:var(--text3);margin:10px 0 16px;" id="qr-name-lbl"></div>
    <button class="btn-book" style="margin:0;" onclick="document.getElementById('qr-popup').classList.remove('open')">Close</button>
  </div>
</div>

<!-- Alert popup -->
<div class="popup-overlay" id="alert-popup">
  <div class="popup" style="padding:30px 24px;">
    <div id="alert-icon" style="font-size:40px;margin-bottom:12px;">ℹ️</div>
    <div id="alert-msg" style="font-size:14px;color:var(--text);line-height:1.6;margin-bottom:20px;"></div>
    <button class="btn-book" onclick="document.getElementById('alert-popup').classList.remove('open')">OK</button>
  </div>
</div>
<!-- Confirm dialog -->
<div class="popup-overlay" id="confirm-dialog">
  <div class="popup" style="padding:30px 24px;">
    <div style="font-size:40px;margin-bottom:12px;">🤔</div>
    <div id="cd-msg" style="font-size:14px;color:var(--text);line-height:1.6;margin-bottom:20px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn-outline" style="flex:1;" onclick="document.getElementById('confirm-dialog').classList.remove('open')">No</button>
      <button class="btn-book" id="cd-yes" style="flex:1;margin:0;">Yes</button>
    </div>
  </div>
</div>

<!-- PIN verification popup -->
<div class="popup-overlay" id="pin-verify-popup">
  <div class="popup" style="padding:26px 22px;">
    <div style="font-size:36px;margin-bottom:8px;">🔒</div>
    <h3 id="pin-verify-title" style="margin-bottom:10px;">Enter Your PIN</h3>
    <input id="pin-verify-input" type="password" inputmode="numeric" maxlength="6" placeholder="• • • •" autocomplete="off" onkeyup="if(event.key==='Enter')_pinVerifySubmit()" style="width:100%;text-align:center;font-size:22px;letter-spacing:10px;padding:12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);margin-bottom:10px;box-sizing:border-box;"/>
    <div id="pin-verify-err" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:10px;"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn-outline" style="flex:1;" onclick="document.getElementById('pin-verify-popup').classList.remove('open')">Cancel</button>
      <button class="btn-book" style="flex:1;margin:0;" onclick="_pinVerifySubmit()">Confirm</button>
    </div>
  </div>
</div>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('booking-sw.js',{updateViaCache:'none'}).then(reg=>{
      reg.update().catch(()=>{});
      if(reg.waiting)reg.waiting.postMessage('skipWaiting');
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        if(nw)nw.addEventListener('statechange',()=>{
          if(nw.state==='activated')location.reload();
        });
      });
    }).catch(()=>{});
    navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
  });
}
</script>

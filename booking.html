<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<link rel="icon" type="image/png" sizes="192x192" href="bookingicon192.png">
<link rel="apple-touch-icon" sizes="180x180" href="bookingicon.png">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0c0a;--surface:#1a1814;--surface2:#242018;--surface3:#2e2a22;
  --gold:#c9a96e;--gold2:#e8c98a;--text:#f0ece4;--text2:#a89880;--text3:#6b5f4e;
  --green:#2ecc71;--red:#e74c3c;--amber:#f39c12;--border:rgba(201,168,76,0.15);
  --rsm:10px;--rmd:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;text-align:center;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);letter-spacing:1px;}
.logo small{display:block;font-family:'Jost',sans-serif;font-size:10px;color:var(--text3);letter-spacing:3px;font-weight:400;margin-top:2px;}
.container{max-width:480px;margin:0 auto;padding:20px 16px 40px;}

/* Step indicators */
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px;}
.step{width:8px;height:8px;border-radius:50%;background:var(--surface3);transition:all 0.3s;}
.step.active{background:var(--gold);width:24px;border-radius:4px;}
.step.done{background:var(--green);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rmd);padding:20px;margin-bottom:16px;}
.section-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:16px;font-weight:700;}
.fl{font-size:11px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px;}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 14px;color:var(--text);font-family:'Jost',sans-serif;font-size:14px;outline:none;}
.fi:focus{border-color:rgba(201,168,76,0.5);}
.fg{margin-bottom:14px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Date selector */
.date-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.date-row::-webkit-scrollbar{display:none;}
.date-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;cursor:pointer;min-width:60px;transition:all 0.2s;}
.date-btn.selected{background:rgba(201,168,76,0.15);border-color:var(--gold);}
.date-btn .day{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.date-btn .num{font-size:20px;font-weight:700;color:var(--text);line-height:1.2;}
.date-btn .mon{font-size:10px;color:var(--text2);}
.date-btn.selected .num{color:var(--gold);}
.date-btn.today .num{color:var(--gold2);}

/* Slot grid */
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.slot-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
.slot-btn:hover{border-color:rgba(201,168,76,0.4);}
.slot-btn.selected{background:rgba(201,168,76,0.12);border-color:var(--gold);}
.slot-btn.full{opacity:0.4;cursor:not-allowed;background:rgba(231,76,60,0.05);border-color:rgba(231,76,60,0.2);}
.slot-time{font-size:15px;font-weight:700;color:var(--text);}
.slot-avail{font-size:11px;margin-top:3px;}
.slot-btn.full .slot-time{color:var(--text3);}
.slot-period{font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}

/* Save button */
.btn-book{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:var(--rmd);padding:16px;font-family:'Jost',sans-serif;font-size:15px;font-weight:700;color:#1a1510;cursor:pointer;letter-spacing:0.5px;margin-top:8px;}
.btn-book:disabled{opacity:0.4;cursor:not-allowed;}
.btn-outline{width:100%;background:none;border:1px solid var(--border);border-radius:var(--rmd);padding:14px;font-family:'Jost',sans-serif;font-size:14px;color:var(--text2);cursor:pointer;margin-top:8px;}

/* Success screen */
.success{text-align:center;padding:40px 20px;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--text2);line-height:1.6;}
.confirm-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rmd);padding:16px;margin:20px 0;text-align:left;}
.confirm-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;}
.confirm-row:last-child{border:none;}
.confirm-label{color:var(--text3);}
.confirm-val{color:var(--text);font-weight:600;}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text3);}
.spinner{font-size:24px;animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

.note{font-size:12px;color:var(--text3);text-align:center;margin-top:16px;line-height:1.6;}
.badge-full{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3);font-size:10px;padding:2px 6px;border-radius:8px;font-weight:700;}
.badge-avail{background:rgba(46,204,113,0.1);color:var(--green);font-size:11px;}

.google-btn{width:100%;background:#fff;border:1px solid #ddd;border-radius:var(--rmd);padding:14px;font-family:'Jost',sans-serif;font-size:15px;font-weight:600;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;}
.google-btn:hover{background:#f5f5f5;}
.google-btn img{width:20px;height:20px;}
.user-bar{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:13px;}
.sign-out{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text3);cursor:pointer;font-family:'Jost',sans-serif;}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
    <svg viewBox="0 0 100 100" width="30" height="30" fill="none" stroke="var(--gold)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"><circle cx="38" cy="30" r="8" fill="var(--gold)" stroke="none"/><path d="M44 64 C40 52 44 42 52 36 C60 30 66 24 70 14"/><path d="M44 64 C38 60 32 58 26 59"/><path d="M44 64 C44 52 40 44 36 38"/><path d="M36 38 C44 31 54 27 64 25"/><path d="M36 38 C30 44 27 52 26 60"/></svg>
    <div class="logo">Pilates D'Luxe<small>Book a Class · <span onclick="bkCheckUpdate()" style="cursor:pointer;text-decoration:underline;">v12</span></small></div>
  </div>
</div>

<div class="container">
  <div id="main-content">
    <div class="loading"><span class="spinner">⟳</span><br/><br/>Loading availability...</div>
  </div>
</div>

<script>
// Firebase config — same project, pilates collection
const _cfg={apiKey:"AIzaSyDq5AjTUCxZ85CBffYFh_MmKhibN7Pjnl8",authDomain:"ss-indent-pro-3b7ea.firebaseapp.com",projectId:"ss-indent-pro-3b7ea",storageBucket:"ss-indent-pro-3b7ea.firebasestorage.app",messagingSenderId:"221934576188",appId:"1:221934576188:web:9c6ae243ea05b701bc5939"};
if(!firebase.apps.length)firebase.initializeApp(_cfg);
const db=firebase.firestore();

/* ===== Themed popup (replaces ugly browser alert) ===== */
function pdlAlert(msg,icon){
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
    ov.innerHTML=`<div style="background:var(--surface,#1a1a2e);border:1px solid var(--border,#333);border-radius:18px;max-width:340px;width:100%;padding:24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:pdlpop 0.2s ease;">
      <div style="font-size:38px;margin-bottom:10px;">${icon||'ℹ️'}</div>
      <div style="font-size:14px;color:var(--text,#fff);line-height:1.6;margin-bottom:18px;">${msg}</div>
      <button id="pdl-ok" style="background:linear-gradient(135deg,#c9a84c,#e0c068);color:#1a1a2e;border:none;border-radius:24px;padding:11px 32px;font-family:'Jost',sans-serif;font-weight:700;font-size:14px;cursor:pointer;">OK</button>
    </div>`;
    document.body.appendChild(ov);
    const close=()=>{ov.remove();resolve();};
    ov.querySelector('#pdl-ok').onclick=close;
    ov.onclick=e=>{if(e.target===ov)close();};
  });
}
if(!document.getElementById('pdl-pop-style')){
  const st=document.createElement('style');st.id='pdl-pop-style';
  st.textContent='@keyframes pdlpop{from{transform:scale(0.92);opacity:0;}to{transform:scale(1);opacity:1;}}';
  document.head.appendChild(st);
}
const COL='pilates';

const SLOTS=['7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM'];
const MACHINES=5;
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let _clients=[], _bookings={}, _mems={}, _announce=null, _closedDays={}, _plans=[];
let _selDate='', _selSlot='', _step=1;
let _memberPhone='', _memberId='', _memberName='', _memberGreeting='';

// Load data from Firestore
async function loadData(){
  try{
    const [cSnap, bSnap, mSnap, aSnap, clSnap, plSnap] = await Promise.all([
      db.collection(COL).doc('pp_clients').get(),
      db.collection(COL).doc('pp_bookings').get(),
      db.collection(COL).doc('pp_memberships').get(),
      db.collection(COL).doc('pp_announce').get().catch(()=>null),
      db.collection(COL).doc('pp_closed_days').get().catch(()=>null),
      db.collection(COL).doc('pp_plans').get().catch(()=>null)
    ]);
    _clients = cSnap.exists ? JSON.parse(cSnap.data().value) : [];
    _bookings = bSnap.exists ? JSON.parse(bSnap.data().value) : {};
    _mems = mSnap.exists ? JSON.parse(mSnap.data().value) : {};
    try{_announce = (aSnap&&aSnap.exists)?JSON.parse(aSnap.data().value):null;}catch(e){_announce=null;}
    try{_closedDays = (clSnap&&clSnap.exists)?JSON.parse(clSnap.data().value):{};}catch(e){_closedDays={};}
    try{_plans = (plSnap&&plSnap.exists)?JSON.parse(plSnap.data().value):[];}catch(e){_plans=[];}
    renderStep1();
    /* member already authenticated → verify and greet them */
    if(_googleUser&&typeof verifyGoogleUser==='function'){try{verifyGoogleUser();}catch(e){}}
  } catch(e){
    document.getElementById('main-content').innerHTML=`<div class="loading">⚠️ Could not load data.<br/>Please try again.</div>`;
  }
}

function td(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getNext7Days(){
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
    days.push({key:`${y}-${m}-${dd}`,day:DAYS[d.getDay()],num:d.getDate(),mon:MONTHS[d.getMonth()],isToday:i===0});
  }
  return days;
}

function getSlotAvail(date, slot){
  const bks=(_bookings[date]&&_bookings[date][slot])||[];
  return MACHINES - bks.length;
}

function renderStep1(){
  _step=1;
  const days=getNext7Days();
  if(!_selDate)_selDate=days[0].key;

  document.getElementById('main-content').innerHTML=`
    ${(_memberGreeting&&_googleUser)?`<div style="background:linear-gradient(135deg,rgba(201,168,76,0.18),rgba(201,168,76,0.06));border:1px solid rgba(201,168,76,0.4);border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:15px;font-weight:600;color:var(--gold);line-height:1.5;">${_memberGreeting}<div id="member-qr-s1" style="display:flex;justify-content:center;margin-top:12px;"></div><div style="text-align:center;margin-top:8px;"><button onclick="saveMyQR()" style="background:none;border:1px solid var(--gold);border-radius:16px;padding:5px 14px;font-size:12px;color:var(--gold);cursor:pointer;font-family:'Jost',sans-serif;">⬇ Save my QR card (works offline)</button></div></div>`:''}
    ${(_announce&&_announce.msg&&!(_announce.until&&_announce.until<new Date().toISOString().slice(0,10)))?(function(){
      const t=_announce.type;
      const c=t==='warn'?{bg:'rgba(251,191,36,0.12)',br:'rgba(251,191,36,0.5)',ic:'⚠️'}:t==='offer'?{bg:'rgba(201,168,76,0.14)',br:'rgba(201,168,76,0.6)',ic:'🎉'}:{bg:'rgba(96,165,250,0.12)',br:'rgba(96,165,250,0.5)',ic:'ℹ️'};
      return '<div style="background:'+c.bg+';border:1px solid '+c.br+';border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;line-height:1.5;display:flex;gap:10px;align-items:flex-start;"><span style="font-size:18px;">'+c.ic+'</span><span>'+_announce.msg.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</span></div>';
    })():''}
    ${_googleUser?`<div style="text-align:right;margin-bottom:8px;"><button onclick="switchAccount()" style="background:none;border:1px solid var(--border2,#444);border-radius:16px;padding:4px 12px;font-size:11px;color:var(--text2,#aaa);cursor:pointer;font-family:'Jost',sans-serif;">↪ Sign out / switch account (${_googleUser.email})</button></div>`:''}
    <div class="steps">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
      <div class="step" id="s3"></div>
    </div>
    <div class="card">
      <div class="section-title">📅 Select Date</div>
      <div class="date-row" id="date-row">
        ${days.map(d=>`
          <div class="date-btn${d.key===_selDate?' selected':''}${d.isToday?' today':''}${(_closedDays&&_closedDays[d.key])?' closed':''}" onclick="selectDate('${d.key}')" ${(_closedDays&&_closedDays[d.key])?'title="Studio closed"':''} style="${(_closedDays&&_closedDays[d.key])?'opacity:0.4;position:relative;':''}">
            <div class="day">${d.isToday?'Today':d.day}</div>
            <div class="num">${d.num}</div>
            <div class="mon">${(_closedDays&&_closedDays[d.key])?'🚫':d.mon}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="section-title">⏰ Select Slot</div>
      <div class="slot-period">☀️ Morning</div>
      <div class="slot-grid" style="margin-bottom:14px;">
        ${SLOTS.slice(0,5).map(s=>renderSlotBtn(s)).join('')}
      </div>
      <div class="slot-period">🌙 Evening</div>
      <div class="slot-grid">
        ${SLOTS.slice(5).map(s=>renderSlotBtn(s)).join('')}
      </div>
    </div>
    <button class="btn-book" onclick="goStep2()" id="btn-next" ${!_selSlot?'disabled':''}>Continue →</button>
    <p class="note">Select a date and available time slot to continue</p>`;
  /* draw greeting QR (step 1) — centered white box */
  setTimeout(()=>{
    const outer=document.getElementById('member-qr-s1');
    if(outer&&_memberId&&typeof QRCode!=='undefined'){
      outer.style.cssText='display:flex;justify-content:center;align-items:center;margin-top:12px;width:100%;';
      outer.innerHTML='<div id="qr-inner-s1" style="background:#fff;padding:12px;border-radius:12px;display:inline-block;line-height:0;"></div>';
      try{new QRCode(document.getElementById('qr-inner-s1'),{text:'PDL:'+_memberId,width:150,height:150,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});}catch(e){}
    }
  },150);
}
function saveMyQR(){
  /* render a printable/saveable card in a new tab as an image-friendly page */
  const c=_clients.find(x=>x.id===_memberId);
  if(!c){pdlAlert('Please sign in first.','ℹ️');return;}
  const w=window.open('','_blank');
  if(!w){pdlAlert('Please allow popups to save your card.','ℹ️');return;}
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>My Pilates D'Luxe Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    <style>body{font-family:Arial,sans-serif;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center;background:#f5f5f5;}
    .card{background:#fff;border:2px solid #c9a84c;border-radius:16px;padding:24px;text-align:center;max-width:300px;}
    .nm{font-size:20px;font-weight:700;margin-top:12px;color:#111;}
    .id{font-size:13px;color:#666;}
    .hd{font-family:Georgia,serif;font-size:20px;letter-spacing:3px;color:#1a1a1a;}
    .tg{font-size:9px;letter-spacing:2px;color:#8a7a52;text-transform:uppercase;margin-bottom:14px;}
    .tip{font-size:12px;color:#888;margin-top:18px;text-align:center;}</style></head>
    <body><div class="card"><div class="hd">PILATES D'LUXE</div><div class="tg">Luxurious French Pilates</div>
    <div id="q" style="display:flex;justify-content:center;"></div>
    <div class="nm">${(c.fname+' '+(c.lname||'')).trim()}</div><div class="id">Member ID: ${c.memNo||'—'}</div></div>
    <div class="tip">📱 Long-press the card → "Save to Photos" to keep it offline.<br>Show this at the studio to check in.</div>
    <script>new QRCode(document.getElementById('q'),{text:'PDL:${_memberId}',width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});<\/script>
    </body></html>`);
  w.document.close();
}

function renderSlotBtn(slot){
  const avail=getSlotAvail(_selDate, slot);
  const full=avail<=0;
  const sel=slot===_selSlot&&!full;
  const mine=_memberId&&((_bookings[_selDate]&&_bookings[_selDate][slot])||[]).some(b=>b.cid===_memberId&&!b.attended);
  if(mine){
    return `<div class="slot-btn" style="border:2px solid var(--gold,#c9a84c);background:rgba(201,168,76,0.12);cursor:default;">
      <div class="slot-time">${slot.replace(' AM','').replace(' PM','')}<span style="font-size:10px;color:var(--text3);margin-left:3px;">${slot.includes('AM')?'AM':'PM'}</span></div>
      <div class="slot-avail"><span style="color:var(--gold,#c9a84c);font-weight:700;font-size:11px;">✓ YOUR BOOKING</span></div>
      <button onclick="event.stopPropagation();reschedulePrompt('${slot}')" style="margin-top:4px;background:none;border:1px solid var(--gold,#c9a84c);border-radius:12px;padding:2px 8px;font-size:10px;color:var(--gold,#c9a84c);cursor:pointer;">Reschedule</button>
    </div>`;
  }
  return `<div class="slot-btn${full?' full':sel?' selected':''}" onclick="${full?'':'selectSlot(\''+slot+'\')'}">
    <div class="slot-time">${slot.replace(' AM','').replace(' PM','')}<span style="font-size:10px;color:var(--text3);margin-left:3px;">${slot.includes('AM')?'AM':'PM'}</span></div>
    <div class="slot-avail">${full?'<span class="badge-full">FULL</span>':'<span class="badge-avail">'+avail+' spots left</span>'}</div>
  </div>`;
}
/* ===== Member self-reschedule (24h cutoff, into any empty slot) ===== */
let _reschedFrom=null;
function reschedulePrompt(fromSlot){
  const slotHour=_slotStartHour(fromSlot);
  const classTime=new Date(_selDate+'T00:00:00');classTime.setHours(slotHour,0,0,0);
  if((classTime-new Date())<2*3600*1000){
    pdlAlert('Rescheduling is allowed only up to 2 hours before the class. Please contact the studio for last-minute changes.','⏰');
    return;
  }
  _reschedFrom={date:_selDate,slot:fromSlot};
  pdlAlert('Now tap any available slot (this day or another) to move your '+fromSlot+' booking there.','↪').then(()=>{
    _selSlot='';renderStep1();
  });
}
function _slotStartHour(slot){
  const m=slot.match(/(\d+)/);let h=m?parseInt(m[1]):8;
  if(slot.includes('PM')&&h!==12)h+=12;if(slot.includes('AM')&&h===12)h=0;return h;
}
function switchAccount(){
  _reschedFrom=null;
  firebase.auth().signOut().then(()=>{
    _googleUser=null;_memberId='';_memberName='';_memberGreeting='';window._bkStarted=false;
    showSignInGate();
  }).catch(()=>{
    _googleUser=null;showSignInGate();
  });
}

function selectDate(d){
  if(_closedDays&&_closedDays[d]){
    const r=_closedDays[d].reason;
    pdlAlert('🚫 The studio is closed on this day'+(r?' — '+r:'')+'. Please choose another date.');
    return;
  }
  _selDate=d;_selSlot='';
  renderStep1();
}

function selectSlot(s){
  /* reschedule mode: move existing booking into this empty slot */
  if(_reschedFrom){
    const from=_reschedFrom;_reschedFrom=null;
    doReschedule(from,{date:_selDate,slot:s});
    return;
  }
  _selSlot=s;
  document.querySelectorAll('.slot-btn').forEach(el=>el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  document.getElementById('btn-next').disabled=false;
}
async function doReschedule(from,to){
  const okPin=await requireBookingPin();
  if(!okPin)return;
  try{
    const bSnap=await db.collection(COL).doc('pp_bookings').get();
    const bk=bSnap.exists?JSON.parse(bSnap.data().value):{};
    /* remove from old slot */
    if(bk[from.date]&&bk[from.date][from.slot]){
      const arr=bk[from.date][from.slot];
      const i=arr.findIndex(b=>b.cid===_memberId&&!b.attended);
      if(i<0){pdlAlert('That booking was already changed. Please refresh.','ℹ️');return;}
      /* capacity check on the destination */
      if(!bk[to.date])bk[to.date]={};
      if(!bk[to.date][to.slot])bk[to.date][to.slot]=[];
      if(bk[to.date][to.slot].length>=MACHINES){pdlAlert('That slot just became full. Please pick another.','⚠️');return;}
      if(bk[to.date][to.slot].some(b=>b.cid===_memberId)){pdlAlert('You already have a booking in that slot.','ℹ️');return;}
      const moved=arr.splice(i,1)[0];
      moved.bookedAt=new Date().toISOString();moved.notes='Online (rescheduled)';
      bk[to.date][to.slot].push(moved);
      await db.collection(COL).doc('pp_bookings').set({value:JSON.stringify(bk),updated:Date.now()});
      _bookings=bk;
      /* persist a freshly-set PIN if this was the member's first action */
      if(_pendingPinHash&&_mems[_memberId]){_mems[_memberId].bookPin=_pendingPinHash;_pendingPinHash=null;
        await db.collection(COL).doc('pp_memberships').set({value:JSON.stringify(_mems),updated:Date.now()});}
      pdlAlert('✓ Moved to '+to.slot+' on '+formatDate(to.date)+'.','✅').then(()=>{_selSlot='';renderStep1();});
    }
  }catch(e){pdlAlert('Reschedule failed. Please try again.','⚠️');}
}

let _googleUser=null;

function goStep2(){
  if(!_selSlot)return;
  _step=2;
  if(_googleUser&&_memberId){
    // Already signed in & identified — validate the chosen slot, then confirm
    verifyAndConfirm();
    return;
  }
  document.getElementById('main-content').innerHTML=`
    <div class="steps">
      <div class="step done"></div>
      <div class="step active"></div>
      <div class="step"></div>
    </div>
    <div class="card">
      <div class="section-title">🔐 Sign In to Book</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;">Sign in with the Google account associated with your registered email at Pilates D'Luxe.</p>
      <button class="google-btn" onclick="signInGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"/>
        Continue with Google
      </button>
      <button class="btn-outline" onclick="renderStep1()">← Back</button>
    </div>
    <div class="card" style="background:var(--surface2);">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);">
        <span>📅 Date</span><span style="color:var(--text);font-weight:600;">${formatDate(_selDate)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-top:8px;">
        <span>⏰ Slot</span><span style="color:var(--text);font-weight:600;">${_selSlot}</span>
      </div>
    </div>
    <p class="note">Your Google account email must match your registered email at the studio.</p>`;
}

async function signInGoogle(){
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    const result=await firebase.auth().signInWithPopup(provider);
    _googleUser=result.user;
    const hadSlot=!!_selSlot;
    verifyGoogleUser(); /* identifies member + shows welcome */
    /* if they had already chosen a slot before signing in, proceed to confirm */
    if(hadSlot&&_memberId){verifyAndConfirm();}
  }catch(e){
    pdlAlert('Sign in failed. Please try again.');
  }
}

/* STEP 1 job: identify the signed-in member, then ALWAYS show the welcome screen.
   No slot validation here — that happens only when they click Continue. */
function verifyGoogleUser(){
  const email=_googleUser.email.toLowerCase();
  const client=_clients.find(c=>!c.archived&&c.email&&c.email.toLowerCase()===email);
  if(!client){
    document.getElementById('main-content').innerHTML=`
      <div class="card">
        <div class="section-title">❌ Not Registered</div>
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:40px;margin-bottom:12px;">😕</div>
          <p style="font-size:14px;color:var(--text2);line-height:1.6;">
            <strong style="color:var(--text);">${_googleUser.email}</strong><br/>is not registered at Pilates D'Luxe.<br/><br/>
            Please contact the studio to register your email.
          </p>
        </div>
        <button class="btn-outline" onclick="switchAccount()">← Try another account</button>
      </div>`;
    return;
  }
  const mem=_mems[client.id];
  if(!mem){showMemberError('No active membership found. Please contact the studio.');return;}
  if(mem.endDate&&mem.endDate<td()){showMemberError('Your membership expired on '+formatDate(mem.endDate)+'. Please contact the studio to renew.');return;}
  /* identity OK — set member, build greeting, and SHOW WELCOME (screen 1) */
  _memberId=client.id;
  _memberName=(client.fname+' '+(client.lname||'')).trim();
  refreshGreeting();
  _selSlot='';
  renderStep1();
}
/* STEP 3 job: validate the chosen slot for THIS member, then show confirm. */
function verifyAndConfirm(){
  const client=_clients.find(c=>c.id===_memberId);
  if(!client){verifyGoogleUser();return;}
  const mem=_mems[client.id];
  if(!mem){showMemberError('No active membership found. Please contact the studio.');return;}
  if(mem.plan!=='unlimited'&&mem.sessionsLeft<=0){showMemberError('You have no sessions available to book. (Any classes already booked are still confirmed.) Please renew to book more.');return;}
  if(mem.endDate&&mem.endDate<td()){showMemberError('Your membership expired on '+formatDate(mem.endDate)+'. Please contact the studio to renew.');return;}
  if(mem.endDate&&_selDate>mem.endDate){showMemberError('Your membership is valid till '+formatDate(mem.endDate)+'. The selected date is beyond your plan validity.');return;}
  if(mem.startDate&&_selDate<mem.startDate){showMemberError('Your plan starts on '+formatDate(mem.startDate)+'. You can book classes from that date onward.');return;}
  if(client.isTrial){
    const alreadyBooked=Object.entries(_bookings).some(([d,slots])=>Object.values(slots).some(arr=>arr.some(b=>b.cid===client.id)));
    if(alreadyBooked){showMemberError('Trial class already used. Please enrol for membership.');return;}
  }
  const slotBks=(_bookings[_selDate]&&_bookings[_selDate][_selSlot])||[];
  if(slotBks.some(b=>b.cid===client.id)){showMemberError('You are already booked for this slot! Tap "Back to slots" and choose another.');return;}
  goStep3();
}
/* builds _memberGreeting from the CURRENT in-memory _mems (so it stays
   accurate after each booking in the same session) */
function refreshGreeting(){
  try{
    const client=_clients.find(x=>x.id===_memberId);
    if(!client){_memberGreeting='';return;}
    const mem=_mems[_memberId];
    const fn=client.fname||'there';
    let line='';
    if(mem){
      const dleft=Math.ceil((new Date(mem.endDate+'T00:00:00')-new Date(td()+'T00:00:00'))/86400000);
      const planName=(_plans&&_plans.find?(_plans.find(p=>p.id===mem.plan)||{}).name:'')||mem.plan||'';
      /* count this member's attended + upcoming-booked classes */
      let attended=0, booked=0;
      try{Object.values(_bookings||{}).forEach(day=>Object.values(day||{}).forEach(arr=>(arr||[]).forEach(b=>{
        if(b.cid===_memberId){ if(b.attended)attended++; else booked++; }
      })));}catch(e){}
      let parts=[];
      if(planName)parts.push('<b>'+planName+'</b> plan');
      if(mem.plan==='unlimited')parts.push('Unlimited sessions');
      else if(typeof mem.sessionsLeft==='number'){
        const total=mem.sessionsTotal||0;
        const available=mem.sessionsLeft; /* not yet booked */
        parts.push('Attended: '+attended+' · Booked: '+booked+' · Available: '+available+' (of '+total+')');
      }
      if(mem.endDate)parts.push('valid till '+formatDate(mem.endDate));
      line=parts.join(' · ');
      if(mem.plan!=='unlimited'&&typeof mem.sessionsLeft==='number'&&mem.sessionsLeft<=0){
        if(booked>0)
          line+='<br><span style="color:#fbbf24;">All sessions booked — you have '+booked+' upcoming class'+(booked!==1?'es':'')+'. To book more, renew your plan.</span>';
        else
          line+='<br><span style="color:#f87171;">⚠️ No sessions left — please renew.</span>';
      }
      else if(dleft>=0&&dleft<=7)
        line+='<br><span style="color:#fbbf24;">Expires in '+dleft+' day'+(dleft!==1?'s':'')+' — renew soon!</span>';
    }
    _memberGreeting='Welcome back, '+fn+'! 🌸'+(line?'<br><span style="font-size:13px;opacity:0.95;font-weight:400;">'+line+'</span>':'');
  }catch(e){_memberGreeting='';}
}

function showMemberError(msg){
  document.getElementById('main-content').innerHTML=`
    <div class="card" style="text-align:center;padding:30px 20px;">
      <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
      <p style="font-size:14px;color:var(--text2);line-height:1.6;">${msg}</p>
      <button class="btn-outline" style="margin-top:16px;" onclick="renderStep1()">← Back</button>
    </div>`;
}

function goStep3(){
  _step=3;
  document.getElementById('main-content').innerHTML=`
    <div style="text-align:center;font-size:14px;color:var(--gold);font-weight:700;margin-bottom:12px;">${_memberName||''}</div>
    <div class="steps">
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step active"></div>
    </div>
    <div class="card">
      <div class="section-title">✅ Confirm Booking</div>
      <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-label">Name</span><span class="confirm-val">${_memberName}</span></div>
        <div class="confirm-row"><span class="confirm-label">Date</span><span class="confirm-val">${formatDate(_selDate)}</span></div>
        <div class="confirm-row"><span class="confirm-label">Time</span><span class="confirm-val">${_selSlot}</span></div>
        <div class="confirm-row"><span class="confirm-label">Studio</span><span class="confirm-val">Pilates D'Luxe</span></div>
      </div>
      <button class="btn-book" onclick="confirmBooking()" id="btn-confirm">Confirm Booking ✓</button>
      <button class="btn-outline" onclick="_selSlot='';renderStep1()">← Back to slots</button>
    </div>`;
}

async function confirmBooking(){
  /* Per-member booking PIN gate (stops accidental bookings by others) */
  const okPin=await requireBookingPin();
  if(!okPin)return;
  _doConfirmBooking();
}
async function _sha(t){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
/* returns true if the member's PIN is verified (or just set) */
function requireBookingPin(){
  return new Promise(resolve=>{
    const mem=_mems[_memberId]||{};
    const hasPin=!!mem.bookPin;
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(5px);z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;';
    ov.innerHTML=`<div style="background:var(--surface,#1a1a2e);border:1px solid var(--border,#333);border-radius:18px;max-width:320px;width:100%;padding:24px;text-align:center;">
      <div style="font-size:34px;margin-bottom:6px;">🔒</div>
      <div style="font-size:16px;font-weight:700;color:var(--text,#fff);margin-bottom:4px;">${hasPin?'Enter your booking PIN':'Set a booking PIN'}</div>
      <div style="font-size:12px;color:var(--text2,#aaa);margin-bottom:16px;line-height:1.5;">${hasPin?'Enter your 4-digit PIN to confirm this booking.':'Create a 4-digit PIN. You\'ll enter it each time you book — it stops others (like kids!) from booking by mistake.'}</div>
      <input id="bp-in" type="tel" inputmode="numeric" maxlength="4" placeholder="● ● ● ●" autocomplete="off" name="pdl-bookpin" data-1p-ignore data-lpignore="true" data-form-type="other" style="width:140px;text-align:center;font-size:24px;letter-spacing:8px;padding:10px;border-radius:12px;border:1px solid var(--border2,#444);background:var(--surface2,#222);color:var(--text,#fff);outline:none;"/>
      <div id="bp-err" style="font-size:12px;color:#f87171;min-height:16px;margin:8px 0;"></div>
      <button id="bp-ok" style="width:100%;background:linear-gradient(135deg,#c9a84c,#e0c068);color:#1a1a2e;border:none;border-radius:24px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;">${hasPin?'Confirm':'Set PIN & Continue'}</button>
      <button id="bp-cancel" style="width:100%;background:none;border:none;color:var(--text2,#aaa);padding:10px;font-size:13px;cursor:pointer;margin-top:4px;">Cancel</button>
      ${hasPin?'<div style="font-size:11px;color:var(--text3,#777);margin-top:6px;">Forgot PIN? Ask the studio to reset it.</div>':''}
    </div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#bp-in');setTimeout(()=>inp.focus(),100);
    const err=ov.querySelector('#bp-err');
    const close=v=>{ov.remove();resolve(v);};
    ov.querySelector('#bp-cancel').onclick=()=>close(false);
    inp.oninput=()=>{inp.value=inp.value.replace(/\D/g,'').slice(0,4);};
    inp.onkeydown=e=>{if(e.key==='Enter')ov.querySelector('#bp-ok').click();};
    ov.querySelector('#bp-ok').onclick=async()=>{
      const pin=inp.value;
      if(pin.length!==4){err.textContent='Enter a 4-digit PIN';return;}
      const h=await _sha('PDLBOOK'+pin);
      if(hasPin){
        if(h===mem.bookPin)close(true);
        else{err.textContent='Wrong PIN. Try again.';inp.value='';inp.focus();}
      }else{
        /* set the PIN now (saved with the booking write) */
        _pendingPinHash=h;close(true);
      }
    };
  });
}
let _pendingPinHash=null;
async function _doConfirmBooking(){
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').textContent='Booking...';
  try{
    // Re-fetch latest bookings to avoid conflicts
    const bSnap=await db.collection(COL).doc('pp_bookings').get();
    const freshBk=bSnap.exists?JSON.parse(bSnap.data().value):{};
    // Check slot still available
    if(!freshBk[_selDate])freshBk[_selDate]={};
    if(!freshBk[_selDate][_selSlot])freshBk[_selDate][_selSlot]=[];
    if(freshBk[_selDate][_selSlot].length>=MACHINES){
      pdlAlert('Sorry! This slot just got full. Please select another slot.');
      _selSlot='';renderStep1();return;
    }
    if(freshBk[_selDate][_selSlot].some(b=>b.cid===_memberId)){
      pdlAlert('You are already booked for this slot!');return;
    }
    // Add booking
    freshBk[_selDate][_selSlot].push({cid:_memberId,notes:'Online booking',attended:false,bookedAt:new Date().toISOString()});
    // Deduct session — re-verify plan limits with fresh data (B2 enforcement)
    const mSnap=await db.collection(COL).doc('pp_memberships').get();
    const freshMems=mSnap.exists?JSON.parse(mSnap.data().value):{};
    const fm=freshMems[_memberId];
    if(fm&&fm.plan!=='unlimited'&&(fm.sessionsLeft||0)<=0){
      pdlAlert('No sessions remaining on your plan. Please renew your membership.');
      renderStep1();return;
    }
    if(fm&&fm.endDate&&_selDate>fm.endDate){
      pdlAlert('Your membership validity ends on '+fm.endDate+'. Please renew to book this date.');
      renderStep1();return;
    }
    if(freshMems[_memberId]&&freshMems[_memberId].plan!=='unlimited'&&freshMems[_memberId].sessionsLeft>0){
      freshMems[_memberId].sessionsLeft--;
    }
    /* save a newly-created booking PIN onto the member's record */
    if(_pendingPinHash&&freshMems[_memberId]){freshMems[_memberId].bookPin=_pendingPinHash;_pendingPinHash=null;}
    if(freshMems[_memberId]){
      await db.collection(COL).doc('pp_memberships').set({value:JSON.stringify(freshMems),updated:Date.now()});
    }
    await db.collection(COL).doc('pp_bookings').set({value:JSON.stringify(freshBk),updated:Date.now()});
    /* sync in-memory state so a SECOND booking in the same session sees the
       updated session count + new booking (fixes stale-count over-booking) */
    _mems=freshMems;_bookings=freshBk;
    /* refresh the greeting line with the new remaining count */
    if(typeof refreshGreeting==='function')refreshGreeting();
    showSuccess();
  }catch(e){
    pdlAlert('Booking failed. Please try again.');
    document.getElementById('btn-confirm').disabled=false;
    document.getElementById('btn-confirm').textContent='Confirm Booking ✓';
  }
}

function showSuccess(){
  document.getElementById('main-content').innerHTML=`
    <div class="success">
      <div class="success-icon">🎉</div>
      <div class="success-title">You're Booked!</div>
      <p class="success-sub">See you at the studio, ${_memberName.split(' ')[0]}!</p>
      <div class="confirm-card">
        <div class="confirm-row"><span class="confirm-label">Date</span><span class="confirm-val">${formatDate(_selDate)}</span></div>
        <div class="confirm-row"><span class="confirm-label">Time</span><span class="confirm-val">${_selSlot}</span></div>
        <div class="confirm-row"><span class="confirm-label">Studio</span><span class="confirm-val">Pilates D'Luxe</span></div>
      </div>
      <button class="btn-book" style="margin-top:24px;" onclick="_selSlot='';_reschedFrom=null;renderStep1()">Book Another Class</button>
    </div>`;
}

function formatDate(d){
  if(!d)return '';
  const[y,m,dd]=d.split('-');
  const dt=new Date(+y,+m-1,+dd);
  return DAYS[dt.getDay()]+', '+dt.getDate()+' '+MONTHS[dt.getMonth()]+' '+y;
}

/* Members must sign in with their registered Google account first —
   Firestore security rules require an authenticated session to read data. */
function showSignInGate(){
  document.getElementById('main-content').innerHTML=`
    <div class="card" style="text-align:center;">
      <div class="section-title" style="justify-content:center;">Welcome to Pilates D'Luxe</div>
      <p style="font-size:14px;color:var(--text2);line-height:1.6;margin:14px 0 20px;">
        Please sign in with the Google account (email) registered with the studio to view available slots and book your class.
      </p>
      <button class="btn-book" onclick="signInGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px;height:20px;background:#fff;border-radius:3px;padding:2px;"/>
        Sign in with Google
      </button>
      <p class="note">Your data is secure. Only your studio-registered email can book.</p>
    </div>`;
}
firebase.auth().onAuthStateChanged(u=>{
  if(u){
    _googleUser=u;
    if(!window._bkStarted){window._bkStarted=true;loadData();}
  }else{
    showSignInGate();
  }
});
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('booking-sw.js').catch(()=>{}));
}
function bkCheckUpdate(){
  pdlAlert('You are on <b>v12</b>. Tap OK to force-load the latest version.','🔄').then(()=>{
    Promise.resolve()
      .then(()=>('serviceWorker' in navigator)?navigator.serviceWorker.getRegistrations().then(rs=>Promise.all(rs.map(r=>r.unregister()))):null)
      .then(()=>('caches' in window)?caches.keys().then(ks=>Promise.all(ks.map(k=>caches.delete(k)))):null)
      .then(()=>location.reload(true))
      .catch(()=>location.reload(true));
  });
}
</script>
